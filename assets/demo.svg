<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 500" role="img" aria-label="Animated demo: one command installs SoulDrop, the onboarding interview runs, and a personal assistant with custom skills is created">
  <title>SoulDrop demo — one command, one interview, your assistant is ready</title>
  <style>
    text { font-family: ui-monospace, 'Cascadia Mono', 'SF Mono', Menlo, Consolas, monospace; font-size: 15px; }
    .hd  { font-size: 12px; fill: #8A93A6; }
    .pr  { fill: #E8B04B; }
    .cmd { fill: #E8ECF4; }
    .out { fill: #C9D2E3; }
    .dim { fill: #8A93A6; }
    .ok  { fill: #2FD6C3; }
    .amb { fill: #E8B04B; }
    .fin { fill: #2FD6C3; font-weight: 700; }

    .stage { animation: stage 18s linear infinite; }
    @keyframes stage {
      0% { opacity: 0; }
      1.5%, 96% { opacity: 1; }
      99.5%, 100% { opacity: 0; }
    }

    /* typewriter wipes (cover rect + caret slide right in char steps) */
    .a-t1 { animation: t1 18s linear infinite; }
    @keyframes t1 {
      0%, 2.8% { transform: translateX(0); animation-timing-function: steps(48, end); }
      15%, 100% { transform: translateX(426px); }
    }
    .a-c1 { animation: c1 18s linear infinite; }
    @keyframes c1 { 0%, 14.99% { opacity: 1; } 15%, 100% { opacity: 0; } }

    .a-t5 { animation: t5 18s linear infinite; }
    @keyframes t5 {
      0%, 30.6% { transform: translateX(0); animation-timing-function: steps(6, end); }
      35%, 100% { transform: translateX(64px); }
    }
    .a-c5 { animation: c5 18s linear infinite; }
    @keyframes c5 { 0%, 28.99% { opacity: 0; } 29%, 34.99% { opacity: 1; } 35%, 100% { opacity: 0; } }
    .a-p5 { animation: p5 18s linear infinite; }
    @keyframes p5 { 0%, 28.9% { opacity: 0; } 29.5%, 100% { opacity: 1; } }

    .a-t6 { animation: t6 18s linear infinite; }
    @keyframes t6 {
      0%, 38.3% { transform: translateX(0); animation-timing-function: steps(8, end); }
      42.8%, 100% { transform: translateX(82px); }
    }
    .a-c6 { animation: c6 18s linear infinite; }
    @keyframes c6 { 0%, 37.99% { opacity: 0; } 38%, 42.79% { opacity: 1; } 42.8%, 100% { opacity: 0; } }
    .a-p6 { animation: p6 18s linear infinite; }
    @keyframes p6 { 0%, 37.4% { opacity: 0; } 38%, 100% { opacity: 1; } }

    /* line reveals */
    .a-r2  { animation: r2  18s linear infinite; }
    .a-r3  { animation: r3  18s linear infinite; }
    .a-r4  { animation: r4  18s linear infinite; }
    .a-r7  { animation: r7  18s linear infinite; }
    .a-r8  { animation: r8  18s linear infinite; }
    .a-r9  { animation: r9  18s linear infinite; }
    .a-r10 { animation: r10 18s linear infinite; }
    .a-r11 { animation: r11 18s linear infinite; }
    .a-k1  { animation: k1  18s linear infinite; }
    .a-k2  { animation: k2  18s linear infinite; }
    .a-k3  { animation: k3  18s linear infinite; }
    .a-k4  { animation: k4  18s linear infinite; }
    .a-r13 { animation: r13 18s linear infinite; }
    @keyframes r2  { 0%, 18.3% { opacity: 0; transform: translateY(5px); } 19.8%, 100% { opacity: 1; transform: translateY(0); } }
    @keyframes r3  { 0%, 22.2% { opacity: 0; transform: translateY(5px); } 23.7%, 100% { opacity: 1; transform: translateY(0); } }
    @keyframes r4  { 0%, 26.1% { opacity: 0; transform: translateY(5px); } 27.6%, 100% { opacity: 1; transform: translateY(0); } }
    @keyframes r7  { 0%, 47.2% { opacity: 0; transform: translateY(5px); } 48.7%, 100% { opacity: 1; transform: translateY(0); } }
    @keyframes r8  { 0%, 52.8% { opacity: 0; transform: translateY(5px); } 54.3%, 100% { opacity: 1; transform: translateY(0); } }
    @keyframes r9  { 0%, 58.3% { opacity: 0; transform: translateY(5px); } 59.8%, 100% { opacity: 1; transform: translateY(0); } }
    @keyframes r10 { 0%, 63.9% { opacity: 0; transform: translateY(5px); } 65.4%, 100% { opacity: 1; transform: translateY(0); } }
    @keyframes r11 { 0%, 69.4% { opacity: 0; transform: translateY(5px); } 70.9%, 100% { opacity: 1; transform: translateY(0); } }
    @keyframes k1  { 0%, 73.9% { opacity: 0; transform: translateY(5px); } 75.0%, 100% { opacity: 1; transform: translateY(0); } }
    @keyframes k2  { 0%, 76.1% { opacity: 0; transform: translateY(5px); } 77.2%, 100% { opacity: 1; transform: translateY(0); } }
    @keyframes k3  { 0%, 78.3% { opacity: 0; transform: translateY(5px); } 79.4%, 100% { opacity: 1; transform: translateY(0); } }
    @keyframes k4  { 0%, 80.6% { opacity: 0; transform: translateY(5px); } 81.7%, 100% { opacity: 1; transform: translateY(0); } }
    @keyframes r13 { 0%, 85%   { opacity: 0; transform: translateY(5px); } 86.5%, 100% { opacity: 1; transform: translateY(0); } }

    /* soft glow pulse behind the final line */
    .a-glow { animation: glow 18s linear infinite; }
    @keyframes glow {
      0%, 86% { opacity: 0; }
      88% { opacity: 0.75; }
      90% { opacity: 0.35; }
      92% { opacity: 0.75; }
      94% { opacity: 0.35; }
      96%, 100% { opacity: 0; }
    }

    /* resting caret blink after the finale */
    .a-cend { animation: cend 18s steps(1, end) infinite; }
    @keyframes cend {
      0%, 86.9% { opacity: 0; }
      87% { opacity: 1; }
      89% { opacity: 0; }
      91% { opacity: 1; }
      93% { opacity: 0; }
      95% { opacity: 1; }
      96%, 100% { opacity: 0; }
    }
  </style>

  <defs>
    <filter id="d-blur" x="-40%" y="-200%" width="180%" height="500%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <clipPath id="d-clip">
      <rect x="2" y="2" width="836" height="496" rx="15"/>
    </clipPath>
  </defs>

  <!-- terminal card -->
  <rect x="1" y="1" width="838" height="498" rx="16" fill="#12151C" stroke="#2A3040" stroke-width="2"/>

  <g clip-path="url(#d-clip)">
    <!-- title bar -->
    <rect x="2" y="2" width="836" height="44" fill="#171B24"/>
    <line x1="2" y1="46" x2="838" y2="46" stroke="#232837" stroke-width="1"/>
    <circle cx="30" cy="24" r="6" fill="#FF5F56"/>
    <circle cx="52" cy="24" r="6" fill="#FFBD2E"/>
    <circle cx="74" cy="24" r="6" fill="#27C93F"/>
    <text x="420" y="29" text-anchor="middle" class="hd">souldrop — drop a soul into any machine</text>

    <g class="stage">
      <!-- L1: install command, typed -->
      <text x="30" y="80" class="pr">PS&gt;</text>
      <text x="64" y="80" class="cmd" textLength="413">irm https://…/souldrop/main/install/go.ps1 | iex</text>
      <g class="a-t1">
        <rect x="64" y="65" width="428" height="21" fill="#12151C"/>
        <rect class="a-c1" x="64" y="66" width="9" height="18" fill="#E8B04B"/>
      </g>

      <!-- install output -->
      <text class="a-r2" x="30" y="107"><tspan class="ok">→</tspan><tspan class="out" dx="8">Claude Code detected</tspan><tspan class="ok" dx="8">✓</tspan></text>
      <text class="a-r3" x="30" y="134"><tspan class="ok">→</tspan><tspan class="out" dx="8">SoulDrop brain installed</tspan><tspan class="ok" dx="8">✓</tspan></text>
      <text class="a-r4" x="30" y="161"><tspan class="ok">→</tspan><tspan class="out" dx="8">Plugin marketplace registered</tspan><tspan class="ok" dx="8">✓</tspan></text>

      <!-- L5: claude, typed -->
      <text class="a-p5" x="30" y="192"><tspan class="pr">PS&gt;</tspan></text>
      <text x="64" y="192" class="cmd" textLength="52">claude</text>
      <g class="a-t5">
        <rect x="64" y="177" width="64" height="21" fill="#12151C"/>
        <rect class="a-c5" x="64" y="178" width="9" height="18" fill="#E8B04B"/>
      </g>

      <!-- L6: /onboard, typed -->
      <text class="a-p6" x="30" y="219"><tspan class="pr">&gt;</tspan></text>
      <text x="48" y="219" class="cmd" textLength="69">/onboard</text>
      <g class="a-t6">
        <rect x="48" y="204" width="82" height="21" fill="#12151C"/>
        <rect class="a-c6" x="48" y="205" width="9" height="18" fill="#E8B04B"/>
      </g>

      <!-- interview -->
      <text class="a-r7"  x="30" y="250"><tspan class="dim">🌐 Which language?</tspan><tspan class="amb" dx="10">›</tspan><tspan class="cmd" dx="8">English</tspan></text>
      <text class="a-r8"  x="30" y="277"><tspan class="dim">🙂 What should I call you?</tspan><tspan class="amb" dx="10">›</tspan><tspan class="cmd" dx="8">Kit</tspan></text>
      <text class="a-r9"  x="30" y="304"><tspan class="dim">💼 What do you do?</tspan><tspan class="amb" dx="10">›</tspan><tspan class="cmd" dx="8">Filmmaker &amp; AI builder</tspan></text>
      <text class="a-r10" x="30" y="331"><tspan class="dim">⭐ Name your assistant</tspan><tspan class="amb" dx="10">›</tspan><tspan class="cmd" dx="8">Jarvis</tspan></text>

      <!-- forge -->
      <text class="a-r11" x="30" y="362"><tspan class="amb">⚒ Forging custom skills for your profession…</tspan></text>
      <text class="a-k1" x="46"  y="389"><tspan class="out">shot-list</tspan><tspan class="ok" dx="6">✓</tspan></text>
      <text class="a-k2" x="192" y="389"><tspan class="out">budget-quote</tspan><tspan class="ok" dx="6">✓</tspan></text>
      <text class="a-k3" x="364" y="389"><tspan class="out">client-brief</tspan><tspan class="ok" dx="6">✓</tspan></text>
      <text class="a-k4" x="530" y="389"><tspan class="out">color-grade</tspan><tspan class="ok" dx="6">✓</tspan></text>

      <!-- finale -->
      <text class="a-glow" x="30" y="424" fill="#2FD6C3" filter="url(#d-blur)" font-weight="700">✨ Jarvis is ready — 4 custom skills created.</text>
      <text class="a-r13" x="30" y="424"><tspan class="fin">✨ Jarvis is ready — 4 custom skills created.</tspan></text>
      <rect class="a-cend" x="30" y="437" width="9" height="18" fill="#2FD6C3"/>
    </g>
  </g>
</svg>
