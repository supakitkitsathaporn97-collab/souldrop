<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="SoulDrop — drop a soul into any machine">
  <title>SoulDrop — drop a soul into any machine</title>
  <defs>
    <linearGradient id="b-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161A23"/>
      <stop offset="1" stop-color="#101319"/>
    </linearGradient>
    <linearGradient id="b-drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2C56B"/>
      <stop offset="1" stop-color="#D89428"/>
    </linearGradient>
    <clipPath id="b-clip">
      <rect x="1" y="1" width="1278" height="318" rx="24"/>
    </clipPath>
  </defs>

  <rect x="1" y="1" width="1278" height="318" rx="24" fill="url(#b-tile)" stroke="#262C3A" stroke-width="2"/>

  <g clip-path="url(#b-clip)">
    <!-- atmosphere -->
    <circle cx="150" cy="30" r="280" fill="#E8B04B" opacity="0.05"/>
    <circle cx="1150" cy="310" r="300" fill="#2FD6C3" opacity="0.05"/>
    <!-- watermark droplet, right side -->
    <g transform="translate(1010,-20) scale(2.6)" opacity="0.05">
      <path d="M64 18 C57 31 31 61 31 82 a33 33 0 0 0 66 0 C97 61 71 31 64 18 Z" fill="none" stroke="#E8ECF4" stroke-width="3"/>
    </g>
  </g>

  <!-- mark -->
  <g transform="translate(592,16) scale(0.75)">
    <path d="M64 18 C57 31 31 61 31 82 a33 33 0 0 0 66 0 C97 61 71 31 64 18 Z" fill="url(#b-drop)"/>
    <ellipse cx="48" cy="54" rx="5.5" ry="10" fill="#FFFFFF" opacity="0.22" transform="rotate(24 48 54)"/>
    <path d="M64 60 L69.5 74.5 L84 80 L69.5 85.5 L64 100 L58.5 85.5 L44 80 L58.5 74.5 Z" fill="#2FD6C3"/>
  </g>

  <!-- wordmark -->
  <text x="640" y="208" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="66" font-weight="700" letter-spacing="4" fill="#E8ECF4">Soul<tspan fill="url(#b-drop)">Drop</tspan></text>

  <!-- taglines -->
  <text x="640" y="252" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="21" fill="#8A93A6">Drop a soul into any machine — your personal AI assistant, fully automatic.</text>
  <text x="640" y="282" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-style="italic" fill="#5C6577">Thả một linh hồn vào bất kỳ máy nào — trợ lý AI cá nhân của bạn, tự động hoàn toàn.</text>
</svg>
